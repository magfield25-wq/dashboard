<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEODIS Business Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#06296f;--green:#8bd66d;--bg:#f4f7fb;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:linear-gradient(135deg,#f7fafc,#eef4ff);min-height:100vh;color:var(--ink)}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:min(94vw,620px);background:white;border:1px solid var(--line);border-radius:28px;padding:34px;box-shadow:0 18px 50px rgba(6,41,111,.13)}
.logo{text-align:center;margin-bottom:12px}
.logo img{width:min(270px,76vw);height:auto;display:inline-block}
h1{font-size:28px;text-align:center;color:var(--navy);font-weight:900;letter-spacing:-.5px;margin:10px 0 6px}
.sub{text-align:center;color:var(--muted);font-size:14px;font-weight:700;margin-bottom:26px}
.login{margin-top:22px;display:grid;gap:10px}
.login input{height:48px;border:1px solid #d1d5db;border-radius:14px;padding:0 14px;font-size:16px;outline:none}
.login input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(6,41,111,.12)}
.btn{border:none;border-radius:14px;height:50px;background:var(--navy);color:#fff;font-weight:900;font-size:15px;cursor:pointer;transition:.18s;text-decoration:none;display:flex;align-items:center;justify-content:center}
.btn:hover{background:var(--green);color:var(--navy)}
.menu{display:none;grid-template-columns:1fr;gap:12px;margin-top:24px}
.menu .item{padding:18px 16px;border-radius:18px;background:#fff;border:1px solid #dbe3f0;text-decoration:none;color:var(--ink);box-shadow:0 4px 14px rgba(31,41,55,.05)}
.menu .item b{display:block;color:var(--navy);font-size:17px;margin-bottom:5px}
.menu .item span{font-size:12px;color:var(--muted);line-height:1.45}
.menu .item:hover{border-color:var(--green);background:#f8fff5}
.msg{min-height:18px;color:#d93025;font-size:12px;font-weight:800;text-align:center}
.foot{margin-top:22px;text-align:center;font-size:12px;color:#9ca3af;font-weight:700}
@media(max-width:480px){.card{padding:24px 18px;border-radius:22px}h1{font-size:22px}}
</style>
</head>

<script>
const DASHBOARD_PASSWORD='1234';
function openMenu(){
  document.getElementById('loginBox').style.display='none';
  document.getElementById('menu').style.display='grid';
}
function login(){
  const pw=document.getElementById('pw');
  const msg=document.getElementById('msg');
  if(String(pw.value)===DASHBOARD_PASSWORD){
    sessionStorage.setItem('neodis_dashboard_login','ok');
    openMenu();
  }else{
    msg.textContent='비밀번호가 맞지 않습니다.';
    pw.value='';
    pw.focus();
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
if(sessionStorage.getItem('neodis_dashboard_login')==='ok')openMenu();
</script>
